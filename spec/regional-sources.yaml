    - { brand: Naver,             url: "https://d2.naver.com" }
    - { brand: "Naver (design)",  url: "https://campaign.naver.com/design" }
    - { brand: 당근 (Daangn),      url: "https://medium.com/daangn" }
    - { brand: LINE,              url: "https://techblog.lycorp.co.jp/ko" }
    - { brand: 마켓컬리 (Kurly),    url: "https://helloworld.kurly.com" }
